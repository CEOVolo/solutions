  .vcontact-l .vh2{margin-top:14px}.vchips{margin-top:24px;display:flex;flex-wrap:wrap;gap:20px}.vchips span{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--graphite)}

  .vfmid{font-size:13px;color:var(--graphite)}.vflinks{display:flex;gap:24px;align-items:center;font-size:13px}.vflinks a{color:var(--graphite);transition:color .2s}.vflinks a:hover{color:var(--frost)}.vflinks .lang{display:flex;gap:9px}.vflinks .sep{color:#222}
  #ld{position:fixed;inset:0;z-index:50;background:var(--void);display:grid;place-items:center;transition:opacity .6s}#ld.done{opacity:0;pointer-events:none}
  #ld .m{width:42px;height:42px;border-radius:50%;background:var(--crimson);animation:pulse 1.4s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(.8);opacity:.5}50%{transform:scale(1);opacity:1}}
  #abpick{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9;display:flex;align-items:center;gap:9px;
    background:rgba(18,18,20,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid #262626;border-radius:999px;padding:6px 8px 6px 16px;transition:opacity .4s}
  #abpick .abl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--graphite)}
  #abpick .abb{width:29px;height:29px;border-radius:50%;border:1px solid #2a2a2a;background:none;color:var(--ash);font:600 13px/1 var(--f);cursor:pointer;transition:.2s}
  #abpick .abb:hover{border-color:var(--frost);color:var(--frost)}
  #abpick .abb.on{background:var(--crimson);border-color:var(--crimson);color:#fff}
  body.site-mode #abpick{opacity:0;pointer-events:none}

  #siteScrim{position:fixed;inset:0;z-index:1;opacity:0;pointer-events:none;transition:opacity .6s;
    background:linear-gradient(90deg,rgba(0,0,0,.9) 0%,rgba(0,0,0,.88) 50%,rgba(0,0,0,.78) 100%)}

  @media(max-width:520px){.clang{top:20px}.cbrand{top:22px}#abpick{top:auto;bottom:80px}}
</style>

  <script type="module">
  import * as THREE from 'three';
  const gsap=window.gsap, RM=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const CONFIG={whatsapp:'',email:'trukhin.ve@gmail.com',telegram:''};
  const UI={
    en:{contact:'Contact',heroCta:'Get a plan in 3 days',cases:'See work',more:'Services, pricing & work',scroll:'scroll'},
    ru:{contact:'Контакт',heroCta:'Получить план за 3 дня',cases:'Кейсы',more:'Услуги, цены и кейсы',scroll:'листайте'},
    uk:{contact:'Контакт',heroCta:'Отримати план за 3 дні',cases:'Кейси',more:'Послуги, ціни та кейси',scroll:'гортайте'}
  };

  /* ============ signature: LIQUID OBSIDIAN BLOB that morphs per screen ============ */
  const cube=(()=>{
    let renderer,scene,camera,blob,mat,portrait=false,cur=0;
    // steady position (right); the DRAMA is the images morphing inside, per screen
    // blob glides side-to-side per screen (opposite the text) while the image inside morphs
    const STATE=[
      {amp:0.13,freq:1.05,hue:0.00,x: 1.35,y:0.06,s:1.05},
      {amp:0.12,freq:1.00,hue:0.16,x:-1.35,y:0.10,s:1.07},
      {amp:0.11,freq:0.95,hue:0.34,x: 1.35,y:0.05,s:1.05},
      {amp:0.11,freq:0.90,hue:0.52,x:-1.35,y:0.10,s:1.08},
      {amp:0.10,freq:0.85,hue:0.80,x: 1.35,y:0.06,s:1.10}
    ];
    const st={amp:0.13,freq:1.05,hue:0,x:1.35,y:0.06,s:1,pulse:0};

    // per-screen imagery shown INSIDE the blob (drop real files at assets/blob/1..5.jpg to override)
    // Bright per-screen "worlds" shown inside the glass — generated in-page (always present, no files)
    function makeTex(i){
      const S=512,c=document.createElement('canvas'),x=c.getContext('2d');c.width=c.height=S;
      // clean premium gradient "world" (dawn-sky feel) — smooth, no noise
      const P=[
        ['#08133f','#2f5bff','#a7d3ff'],  // chaos: night → sky blue
        ['#04262b','#12a8a0','#9ff3e6'],  // foundation: deep teal → mint
        ['#240a44','#8a2fd0','#f0b6ff'],  // transformation: violet → lilac
        ['#3a2200','#df8f22','#ffe0a6'],  // premium: bronze → gold
        ['#3a0016','#e01f45','#ffb3c1']   // launch: maroon → rose
      ][i];
      const g=x.createLinearGradient(0,S,0,0);g.addColorStop(0,P[0]);g.addColorStop(.6,P[1]);g.addColorStop(1,P[2]);
      x.fillStyle=g;x.fillRect(0,0,S,S);
      x.globalCompositeOperation='lighter';
      const rg=x.createRadialGradient(S*.5,S*.32,0,S*.5,S*.32,S*.58);
      rg.addColorStop(0,'rgba(255,255,255,.65)');rg.addColorStop(.35,P[2]);rg.addColorStop(1,'rgba(0,0,0,0)');
      x.globalAlpha=.75;x.fillStyle=rg;x.fillRect(0,0,S,S);x.globalAlpha=1;
      x.globalCompositeOperation='source-over';
      const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;
    }
    const slots=STATE.map((_,i)=>makeTex(i));                 // procedural fallback until images load
    // A/B compare: two options per screen — images/N.jpg (A) and images/N-1.jpg (B)
    const variants=[[],[]];                                    // [0]=A, [1]=B
    const pick=[0,0,0,0,0];
    try{ const s=JSON.parse(localStorage.getItem('tlpick')||'[]'); if(s.length===5) for(let i=0;i<5;i++) pick[i]=s[i]?1:0; }catch(e){}
    function applyPick(i){ const v=variants[pick[i]][i]||variants[0][i]; if(v){ slots[i]=v; if(i===cur&&mat){ mat.uniforms.texA.value=v; mat.uniforms.texB.value=v; mat.uniforms.uMix.value=0; } } }
    const loader=new THREE.TextureLoader();
    [['',0],['-1',1]].forEach(([suf,vi])=>{ for(let i=0;i<5;i++){ loader.load(`images/${i+1}${suf}.jpg`,
      tx=>{tx.colorSpace=THREE.SRGBColorSpace;tx.minFilter=THREE.LinearFilter;variants[vi][i]=tx; if(pick[i]===vi) applyPick(i);},undefined,()=>{}); } });
    // A/B picker UI (top-centre)
    const ab=document.createElement('div'); ab.id='abpick';
    ab.innerHTML='<span class="abl"></span><button class="abb" data-v="0">A</button><button class="abb" data-v="1">B</button>';
    document.body.appendChild(ab);
    ab.addEventListener('click',e=>{ const b=e.target.closest('.abb'); if(!b)return; pick[cur]=+b.dataset.v; try{localStorage.setItem('tlpick',JSON.stringify(pick));}catch(_){}
      applyPick(cur); updateAB(); });
    function updateAB(){ ab.querySelector('.abl').textContent='Экран '+(cur+1)+'/5 · картинка'; ab.querySelectorAll('.abb').forEach(b=>b.classList.toggle('on',+b.dataset.v===pick[cur])); }

    function build(){
      const canvas=document.getElementById('cube');
      renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
      renderer.setPixelRatio(Math.min(devicePixelRatio,1.75));renderer.setSize(innerWidth,innerHeight);renderer.setClearAlpha(0);
      scene=new THREE.Scene();
      camera=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,0.1,100);camera.position.set(0,0,4.4);
      mat=new THREE.ShaderMaterial({transparent:true,uniforms:{uT:{value:0},uAmp:{value:st.amp},uFreq:{value:st.freq},uHue:{value:0},
          uMix:{value:0},uBallC:{value:new THREE.Vector2()},uBallR:{value:200},texA:{value:slots[0]},texB:{value:slots[0]}},
        vertexShader:`uniform float uT,uAmp,uFreq;varying vec3 vN;varying vec3 vP;varying vec3 vObj;varying vec2 vCen;varying float vD;varying float vDiss;
          vec3 m289(vec3 x){return x-floor(x*(1./289.))*289.;}vec4 m289(vec4 x){return x-floor(x*(1./289.))*289.;}
          vec4 perm(vec4 x){return m289(((x*34.)+1.)*x);}vec4 tis(vec4 r){return 1.79284291400159-0.85373472095314*r;}
          float sn(vec3 v){const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);
            vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
            vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;i=m289(i);
            vec4 p=perm(perm(perm(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
            float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;vec4 j=p-49.*floor(p*ns.z*ns.z);
            vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.-abs(x)-abs(y);
            vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;vec4 sh=-step(h,vec4(0.));
            vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
            vec4 nm=tis(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));p0*=nm.x;p1*=nm.y;p2*=nm.z;p3*=nm.w;
            vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);m=m*m;return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));}
          void main(){
            float n=sn(normal*uFreq + uT*0.16);float n2=sn(normal*uFreq*2.0 - uT*0.11)*0.4;
            float d=(n+n2)*uAmp;vD=d;vObj=position;
            vDiss=0.5+0.5*sn(position*2.2 + uT*0.12);
            vec3 p=position+normal*d;
            vN=normalMatrix*normal;vec4 mv=modelViewMatrix*vec4(p,1.);vP=mv.xyz;vCen=(modelViewMatrix*vec4(0.0,0.0,0.0,1.0)).xy;gl_Position=projectionMatrix*mv;}`,
        fragmentShader:`uniform float uT,uHue,uMix;uniform vec2 uBallC;uniform float uBallR;uniform sampler2D texA,texB;varying vec3 vN;varying vec3 vP;varying vec3 vObj;varying vec2 vCen;varying float vD;varying float vDiss;
          void main(){
            vec3 N=normalize(vN);
            vec3 V=normalize(-vP);
            float fres=pow(1.0-max(dot(N,V),0.0),3.0);
            // image PINNED to the ball's screen disc => centre stays perfectly static; only the rim refracts/moves
            vec2 uv=vec2(0.5)+(gl_FragCoord.xy-uBallC)/(2.0*uBallR);
            uv+=N.xy*0.13*smoothstep(0.32,1.0,fres);   // distortion only near the edges
            vec3 a=texture2D(texA,uv).rgb, b=texture2D(texB,uv).rgb;
            float wipe=smoothstep(uMix-0.30,uMix+0.30,vDiss);        // liquid crossfade A->B
            vec3 img=mix(b,a,wipe);
            vec3 col=img;
            col*=1.0 - smoothstep(0.5,1.0,fres)*0.4;                 // glass thickness: slight inner-edge darkening
            col+=vec3(0.72,0.82,1.0)*fres*0.5;                       // bright light rim
            vec3 L=normalize(vec3(-0.5,0.72,0.6));vec3 H=normalize(L+V);
            col+=vec3(1.0)*pow(max(dot(N,H),0.0),80.0)*1.35;         // sharp glossy highlight
            col+=vec3(0.72,0.82,1.0)*pow(max(dot(N,H),0.0),16.0)*0.12;
            col+=vec3(0.99,0.11,0.27)*fres*uHue*0.5;                 // crimson charge at the finale
            gl_FragColor=vec4(col,1.0);}`});
      blob=new THREE.Mesh(new THREE.IcosahedronGeometry(1.5,RM?12:64),mat);scene.add(blob);
      layout();
    }
    function layout(){portrait=innerWidth<900;st.scaleBase=portrait?0.82:1;camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();camera.updateMatrixWorld();camera.matrixWorldInverse.copy(camera.matrixWorld).invert();}
    function xFor(i){return portrait?0:STATE[i].x;}
    const clock=new THREE.Clock(),mouse={x:0,y:0,tx:0,ty:0},_c=new THREE.Vector3(),_e=new THREE.Vector3();
    function frame(){
      const t=clock.getElapsedTime();mat.uniforms.uT.value=t;
      mat.uniforms.uAmp.value=st.amp;mat.uniforms.uFreq.value=st.freq;mat.uniforms.uHue.value=st.hue;
      mouse.x+=(mouse.tx-mouse.x)*0.04;mouse.y+=(mouse.ty-mouse.y)*0.04;
      const sc=(st.scaleBase||1)*st.s*(1+Math.sin(t*0.8)*0.02+st.pulse);
      blob.scale.setScalar(sc);
      blob.position.set(st.x,portrait?0.85:st.y,0);
      // project the ball to screen (drawing-buffer px) so the image can be pinned to its disc
      const Wb=renderer.domElement.width,Hb=renderer.domElement.height;
      _c.set(blob.position.x,blob.position.y,0).project(camera);
      _e.set(blob.position.x,blob.position.y+1.5*sc,0).project(camera);
      mat.uniforms.uBallC.value.set((_c.x*0.5+0.5)*Wb,(_c.y*0.5+0.5)*Hb);
      mat.uniforms.uBallR.value=Math.max(2,Math.abs((_e.y*0.5+0.5)*Hb-(_c.y*0.5+0.5)*Hb));
      if(!RM){blob.rotation.y=Math.sin(t*0.06)*0.12+mouse.x*0.16;blob.rotation.x=-mouse.y*0.14;}  // gentle sway, image stays readable
      renderer.render(scene,camera);requestAnimationFrame(frame);
    }
    function morphImage(i){
      if(!mat)return;
      mat.uniforms.texB.value=slots[i];
      if(RM){mat.uniforms.texA.value=slots[i];mat.uniforms.uMix.value=0;return;}
      gsap.killTweensOf(mat.uniforms.uMix);
      mat.uniforms.uMix.value=0;
      gsap.to(mat.uniforms.uMix,{value:1.3,duration:1.3,ease:'power2.inOut',   // >1 so the wipe fully completes
        onComplete(){mat.uniforms.texA.value=slots[i];mat.uniforms.uMix.value=0;}});
    }
    addEventListener('mousemove',e=>{mouse.tx=(e.clientX/innerWidth)*2-1;mouse.ty=(e.clientY/innerHeight)*2-1;});
    addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);layout();st.x=xFor(cur);});
    return {
      start(){build();frame();},
      toSection(i,dir,N){cur=i;const S=STATE[i];
        morphImage(i); updateAB();
        if(RM){st.amp=S.amp;st.freq=S.freq;st.hue=S.hue;st.x=xFor(i);st.s=S.s;return;}
        gsap.to(st,{amp:S.amp,freq:S.freq,hue:S.hue,s:S.s,y:S.y,duration:1.2,ease:'power2.inOut'});
        gsap.to(st,{x:xFor(i),duration:1.2,ease:'power3.inOut'});
        if(i===N-1)gsap.fromTo(st,{pulse:0.14},{pulse:0,duration:1.6,ease:'elastic.out(1,0.4)'});
      },
      enterSite(){gsap.to(st,{x:portrait?0:2.5,duration:0.9,ease:'power2.inOut'});},
      exitSite(){gsap.to(st,{x:xFor(cur),duration:0.9,ease:'power2.inOut'});}
    };
  })();

  // "blob highlights images" — cursor spotlight on conversion tiles
  document.addEventListener('mousemove',e=>{const s=e.target.closest('.vcell');if(!s)return;const r=s.getBoundingClientRect();
    s.style.setProperty('--mx',((e.clientX-r.left)/r.width*100)+'%');s.style.setProperty('--my',((e.clientY-r.top)/r.height*100)+'%');});

  Cinematic.start({content:window.SITE_CONTENT,ui:UI,cube,config:CONFIG,pos:['left','right','left','right','left']});
  </script>
</body>
</html>
